<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante Wanmin</title>

    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
</head>
<body>
    <div id="edit-overlay" class="overlay hidden">
        <article id="edit-product">
            <h2>Editar Producto</h2>
            <label for="product-name">Nombre</label>
            <input id="product-name" type="text">
            <label for="product-price">Precio</label>
            <label for="product-type">Tipo</label>
            <input id="product-price" type="number">
            <input id="product-type" type="text">
            <button id="accept-edit" type="button">Aceptar</button>
            <button id="close-edit" type="button">Cancelar</button>
        </article>
    </div>
    <div class="container">
        <header>
            <h1>Restaurante Wanmin</h1>
        </header>
        <main>
            <section id="menu">
                <h2>Carta</h2>
                
                <!-- Product list -->
                <div class="products">
                    <div class="product">
                        <!-- Product info -->
                        <div class="info" id="p1">
                            <p class="name">Producto 1</p>
                            <p class="price">$999.999</p>
                            <p class="type">Aperitivo</p>
                        </div>

                        <!-- Product control -->
                        <div class="control">
                            <button class="decrement">-</button>
                            <input type="text" class="quantity" disabled value="0">
                            <button class="increment">+</button>
                        </div>

                        <button class="add_to_order" disabled>Añadir</button>
                    </div>

                    <div class="product">
                        <!-- Product info -->
                        <div class="info" id="p2">
                            <p class="name">Producto 2</p>
                            <p class="price">$99.999</p>
                            <p class="type">Postre</p>
                        </div>

                        <!-- Product control -->
                        <div class="control">
                            <button class="decrement">-</button>
                            <input type="text" class="quantity" disabled value="0">
                            <button class="increment">+</button>
                        </div>

                        <button class="add_to_order" disabled>Añadir</button>
                    </div>

                    <div class="product">
                        <!-- Product info -->
                        <div class="info" id="p3">
                            <p class="name">Producto 3</p>
                            <p class="price">$9999.999</p>
                            <p class="type">Plato fuerte</p>
                        </div>

                        <!-- Product control -->
                        <div class="control">
                            <button class="decrement">-</button>
                            <input type="text" class="quantity" disabled value="0">
                            <button class="increment">+</button>
                        </div>

                        <button class="add_to_order" disabled>Añadir</button>
                    </div>

                    <div class="product">
                        <!-- Product info -->
                        <div class="info" id="p4">
                            <p class="name">Producto 4</p>
                            <p class="price">$20.50</p>
                            <p class="type">Bebida</p>
                        </div>

                        <!-- Product control -->
                        <div class="control">
                            <button class="decrement">-</button>
                            <input type="text" class="quantity" disabled value="0">
                            <button class="increment">+</button>
                        </div>

                        <button class="add_to_order" disabled>Añadir</button>
                    </div>

                    <div class="product">
                        <!-- Product info -->
                        <div class="info" id="p5">
                            <p class="name">Producto 5</p>
                            <p class="price">$999.999</p>
                            <p class="type">Aperitivo</p>
                        </div>

                        <!-- Product control -->
                        <div class="control">
                            <button class="decrement">-</button>
                            <input type="text" class="quantity" disabled value="0">
                            <button class="increment">+</button>
                        </div>

                        <button class="add_to_order" disabled>Añadir</button>
                    </div>

                    <div class="product">
                        <!-- Product info -->
                        <div class="info" id="p6">
                            <p class="name">Producto 6</p>
                            <p class="price">$999.999</p>
                            <p class="type">Aperitivo</p>
                        </div>

                        <!-- Product control -->
                        <div class="control">
                            <button class="decrement">-</button>
                            <input type="text" class="quantity" disabled value="0">
                            <button class="increment">+</button>
                        </div>

                        <button class="add_to_order" disabled>Añadir</button>
                    </div>
                </div>

                <div class="products_config">
                    <button id="add-button" type="button">Agregar</button>
                    <button id="edit-button" type="button" disabled>Modificar</button>
                    <button id="delete-button" type="button" disabled>Eliminar</button>
                </div>
            </section>

            <section id="order">
                <h2>Pedido</h2>
            </section>
        </main>
        <footer>
            <button id="display_order" type="button">Ver Pedido</button>
        </footer>
    </div>
</body>
</html>
